name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.6.6"
  AWS_REGION: "eu-central-1"
  TF_ROLE: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsManagementRole"
  TF_BUCKET: "smart-ecommerce-tfstate-${{ vars.AWS_ACCOUNT_ID }}"

jobs:
  apply-management:
    name: Apply / Management
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -backend-config="bucket=${{ env.TF_BUCKET }}"
        working-directory: terraform/management

      - run: terraform apply -auto-approve
        working-directory: terraform/management

  apply-security:
    name: Apply / Security
    runs-on: ubuntu-latest
    environment: production
    needs: apply-management
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -backend-config="bucket=${{ env.TF_BUCKET }}"
        working-directory: terraform/security

      - run: terraform apply -auto-approve
        working-directory: terraform/security

  apply-log:
    name: Apply / Log
    runs-on: ubuntu-latest
    environment: production
    needs: apply-management
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -backend-config="bucket=${{ env.TF_BUCKET }}"
        working-directory: terraform/log

      - run: terraform apply -auto-approve
        working-directory: terraform/log

  apply-workload:
    name: Apply / Workload
    runs-on: ubuntu-latest
    environment: production
    needs: [apply-security, apply-log]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -backend-config="bucket=${{ env.TF_BUCKET }}"
        working-directory: terraform/workload

      - run: terraform apply -auto-approve
        working-directory: terraform/workload

      - name: Export outputs
        working-directory: terraform/workload
        run: |
          echo "API_URL=$(terraform output -raw api_gateway_url)" >> $GITHUB_ENV
          echo "CLOUDFRONT_URL=$(terraform output -raw cloudfront_url)" >> $GITHUB_ENV
          echo "USER_POOL_ID=$(terraform output -raw cognito_user_pool_id)" >> $GITHUB_ENV
          echo "CLIENT_ID=$(terraform output -raw cognito_client_id)" >> $GITHUB_ENV
          echo "FRONTEND_BUCKET=$(terraform output -raw frontend_bucket_name)" >> $GITHUB_ENV
          echo "CF_DIST_ID=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_ENV
