name: Terraform Plan

on:
  pull_request:
    branches: [master]
    paths:
      - "terraform/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.6.6"
  AWS_REGION: "eu-central-1"
  TF_ROLE: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActionsManagementRole"
  TF_BUCKET: "smart-ecommerce-tfstate-${{ vars.AWS_ACCOUNT_ID }}"

jobs:
  plan-management:
    name: Plan / Management
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/management
        run: terraform init -backend-config="bucket=${{ env.TF_BUCKET }}"

      - name: Terraform Plan
        working-directory: terraform/management
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true
        id: plan

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Management Plan\n\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\``
            })

  plan-security:
    name: Plan / Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/security
        run: terraform init -backend-config="bucket=${{ env.TF_BUCKET }}"

      - name: Terraform Plan
        working-directory: terraform/security
        run: terraform plan -no-color

  plan-log:
    name: Plan / Log
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/log
        run: terraform init -backend-config="bucket=${{ env.TF_BUCKET }}"

      - name: Terraform Plan
        working-directory: terraform/log
        run: terraform plan -no-color

  plan-workload:
    name: Plan / Workload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/workload
        run: terraform init -backend-config="bucket=${{ env.TF_BUCKET }}"

      - name: Terraform Plan
        working-directory: terraform/workload
        run: terraform plan -no-color
